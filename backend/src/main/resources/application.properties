spring.application.name=employee-poc
server.port=8080

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:employeedb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 web console at http://localhost:8080/h2-console (JDBC URL: jdbc:h2:mem:employeedb)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
# Base64-encoded HS256 signing key (>= 256 bits). Override in real deployments.
jwt.secret=ZmFrZS1zZWNyZXQta2V5LWZvci1lbXBsb3llZS1wb2MtY2hhbmdlLW1lLTEyMzQ1Njc4OTA=
# Token lifetime in milliseconds (1 hour)
jwt.expiration=3600000

# Default seeded admin (created at startup if missing)
app.admin.username=admin
app.admin.password=admin123
